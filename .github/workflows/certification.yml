name: NWv-7 Certification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  certify:
    name: Static + Vitest + Build Certification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Block rejected patch artifacts
        run: |
          if find . \( -name "*.rej" -o -name "*.orig" \) -print -quit | grep -q .; then
            echo "Rejected patch or backup artifacts were found. Apply or delete them before merging."
            find . \( -name "*.rej" -o -name "*.orig" \) -print
            exit 1
          fi

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: pip install pytest

      - name: Run full certification gate
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports
          npm run test:certify 2>&1 | tee reports/certification_gate.log

      - name: Upload certification failure log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: certification-failure-log
          path: reports/certification_gate.log
          if-no-files-found: ignore
