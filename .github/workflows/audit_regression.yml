name: Audit Regression

# Locks in the Insight audit remediations (findings I001–I010) so they cannot
# silently regress. Runs the Insight cert suite (incl. the dedicated remediation
# locks in auditRemediation.cert.test.ts), lint, and a production build.

on:
  push:
    branches: [ main, master, 'claude/**' ]
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/audit_regression.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  audit-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Remediation locks (I001, I002, I004, I007, I008, I010)
        run: npx vitest run src/insight/src/quality/auditRemediation.cert.test.ts

      - name: Insight cert suite
        run: npx vitest run src/insight

      - name: Production build
        run: npm run build

  synthetic-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Synthetic structural benchmark (generate → replay → score → ratchet)
        # Deterministic corpus + construction-time labels (κ=1.0); ratchet fails on a
        # material regression vs benchmarks/synthetic/BASELINE_METRICS.json.
        run: npm run bench:synth
      - name: Upload benchmark run bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: synthetic-benchmark-run
          path: |
            benchmarks/runs/insight_synth_36h_v1/**/metrics.json
            benchmarks/runs/insight_synth_36h_v1/**/alarms.json
          if-no-files-found: warn
